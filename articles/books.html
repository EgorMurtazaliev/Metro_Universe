<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вселенная Метро — Книги</title>
    <link rel="stylesheet" href="/style.css" />
    <link rel="icon" href="/images/icon.png" />
    <link href="https://fonts.googleapis.com/css2?family=Ysabeau+Office:ital,wght@0,1..1000;1,1..1000&display=swap" rel="stylesheet">
    <script src="/js/components.js" defer></script>
    <script src="/js/comments.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            window.currentArticleId = 'books';
            initComments(window.currentArticleId);
        });
    </script>
</head>

<body class="page">
    <header></header>

    <main class="main">
        <div class="main__feed">
            <h2 class="main_title">Книги серии</h2>
            <section class="main__catalog">
                <ul class="card">
                    <li class="card__block card__block--3">
                        <a class="card__link" href="./book_metro_2033.html">
                            <div class="card__image card__image--ar45 card__image--metro-2033"></div>
                            <h3 class="card__title card__title--3">Метро 2033</h3>
                        </a>
                    </li>
                    <li class="card__block card__block--3">
                        <a class="card__link" href="./book_metro_2034.html">
                            <div class="card__image card__image--ar45 card__image--metro-2034"></div>
                            <h3 class="card__title card__title--3">Метро 2034</h3>
                        </a>
                    </li>
                    <li class="card__block card__block--3">
                        <a class="card__link" href="./book_metro_2035.html">
                            <div class="card__image card__image--ar45 card__image--metro-2035"></div>
                            <h3 class="card__title card__title--3">Метро 2035</h3>
                        </a>
                    </li>
                </ul>
            </section>
            <section class="comments">
                <h3 class="comments__title">Комментарии (<span id="comments-count">0</span>)</h3>
                <div class="comments__form" id="comment-form">
                    <textarea class="comments__textarea" id="comment-text" placeholder="Ваш комментарий..."
                        rows="3"></textarea>
                    <button class="comments__button" id="comment-button">Отправить</button>
                </div>
                <div class="comments__auth" id="comment-auth" style="display: none;">
                    <p>Войдите, чтобы оставить комментарий → <a href="/auth.html">Вход</a></p>
                </div>
                <div class="comments__list" id="comments-list"></div>
            </section>
        </div>
    </main>

    <footer></footer>
</body>

</html>
